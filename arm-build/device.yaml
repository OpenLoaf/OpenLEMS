protocols:
  - id: modbus_local
    protocol: modbus_tcp
    logLevel: INFO
    address: 192.168.0.149:1503
    timeout: 30
  - id: modbus_ammeter
    protocol: modbus_tcp
    logLevel: INFO
    address: 192.168.0.100:5000
    timeout: 30

device:
  id: root
  name: XX场站
  enable: true
  device-children:
    - id: station-energy-store
      name: 储能站
      driver: sess_basic_v1
      enable: true
      logLevel: INFO
      params:
        maxCharge: 30
        maxDischarge: 30
        capacity: 100
        modbusServerEnable: true
        modbusUrl: tcp://0.0.0.0:1506
      device-children:
        - id : station-ammeter-1
          name: 物理安科瑞电表
          protocolId: modbus_ammeter
          driver: ammeter_acrel_10r_v1
          enable: true
          logLevel: INFO
          params:
            unitId: 1
        - id: ess-1
          name: 储能柜1
          driver: ess_pylon_checkwatt_v1
          enable: true
          params:
            maxCharge: 30
            maxDischarge: 30
          device-children:
            - id: star-charge-100E-1
              name: 本地模拟阳光电源PCS
              protocolId: modbus_local
              enable: true
              driver: pcs_star_charge_100E_v1
              logLevel: INFO
              params:
                unitId: 1
                ratedPower: 100
                syncTime: true   # 同步时间
            - id: pylon-tech-us108-1
              name: 本地模拟派能MBMS
              protocolId: modbus_local
              enable: true
              driver: bms_pylon_tech_us108_v1
              logLevel: INFO
              params:
                unitId: 2
                syncTime: true # 同步时间
                ratedPower: 100
                capacity: 100
                maxInputPower: 70
                maxOutputPower: 70
