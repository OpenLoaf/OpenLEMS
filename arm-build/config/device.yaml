cabinets:
  - id: 1
    name: 储能柜1
    modbusEnable: false
    capacity: 1000

  - id: 2
    name: 储能柜2
    modbusEnable: true
    capacity: 232
devices:
  - name: port1
    protocol: modbus_rtu
    enable: false
    address: /dev/tty.usbserial-2120
    timeout: 30
    config:
      speed: 9600
      dataBits: 8
      parity: N
      stopBits: 1
    device-children:
      - name: pcs_rtu_example
        enable: true
        unitId: 1
        cabinetId: 1
        driver: pcs_example
        location: cabinet
        group: pcs
        isMaster: false
        debug: false
      - name: ammeter_rtu_example
        enable: true
        unitId: 2
        cabinetId: 1
        driver: ammeter_example
        location: station # 场站级电表
        group: ess
        isMaster: false
        debug: false

  - name: Modbus_tcp
    protocol: modbus_tcp
    enable: true
    logLevel: INFO
    address: 192.168.0.146:1502
    timeout: 3000
    device-children:
      - name: star-charge-100E
        enable: true
        unitId: 1
        cabinetId: 2
        driver: pcs_starCharge100E
        location: cabinet
        group: pcs
        isMaster: false
        logLevel: INFO
        printCacheValue: true
      - name: pylon-tech-us108
        enable: false
        unitId: 2
        cabinetId: 2
        driver: bms_pylonTechUs108
        location: cabinet
        group: bms
        isMaster: false
        logLevel: INFO
        printCacheValue: true
