services:
  ems-dev:
    build:
      context: ../
      dockerfile: ./script/Dockerfile.dev
      args:
        BUILDKIT_INLINE_CACHE: "1"
      platforms:
        - linux/amd64
    container_name: ems-plan-dev
    ports:
      - "80:80"
    volumes:
      # 数据持久化
      - ../out:/app/out
      # Go 模块缓存
      - go-mod-cache:/go/pkg/mod
    environment:
      - GO111MODULE=on
      - GOPROXY=https://goproxy.cn,direct
      - GOSUMDB=sum.golang.google.cn
      - CGO_ENABLED=1
      - LD_LIBRARY_PATH=/app/lib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  go-mod-cache:
