    unit: "%"
    remark: "SOC"
  - name: power
    unit: "kW"
    remark: "功率"
  - name: targetPower
    unit: "kW"
    remark: "目标功率"
  - name: apparentPower
    unit: "kVA"
    remark: "视在功率"
  - name: reactivePower
    unit: "kVar"
    remark: "无功功率"
  - name: todayIncomingQuantity
    nationalizationName: todayIncomingQuantity
    unit: "kWh"
    remark: "当日充电量"
  - name: todayOutgoingQuantity
    nationalizationName: todayOutgoingQuantity
    unit: "kWh"
    remark: "当日放电量"
