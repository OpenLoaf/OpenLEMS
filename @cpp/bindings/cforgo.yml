---
GENERATOR:
  PackageName: hexlib
  PackageDescription: "Go bindings for hexlib C API generated by c-for-go"
  PackageLicense: "MIT"
  Includes: ["hexlib/hexlib.h"]
  PkgName: hexlib
  ConstRules:
    DefineName: "C.{{name}}"
  FlagGroups:
    - { Name: default, Flags: ["-I../include"] }

PARSER:
  SourcesPaths: ["../include/hexlib"]
  IncludePaths: ["../include"]
  Defines: {}

TRANSLATOR:
  Rules:
    function:
      - { action: accept, from: "hex_.*" }
      - { action: accept, from: "mpc_.*" }
  PtrTips:
    function:
      - { target: "hex_version", tips: [ret] }
      - { target: "mpc_predict", tips: [ret] }
      - { target: "mpc_create_predictor", tips: [ret] }

ARCH:
  # leave defaults so it generates for current platform


