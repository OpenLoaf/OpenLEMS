brand: Pylon
model: TechUs108
version: v1.0.0
author: "zz@hexems.com"
create: "2024-09-07"
remark: "派能108kWh风冷电池MBMS"
protocolType: "modbus"
telemetry:
    - name: soc
      unit: "%"
      displayName: "SOC"
    - name: power
      unit: "kW"
      displayName: "功率"
    - name: targetPower
      unit: "kW"
      displayName: "目标功率"
    - name: apparentPower
      unit: "kVA"
      displayName: "视在功率"
    - name: reactivePower
      unit: "kVar"
      displayName: "无功功率"
    - name: todayIncomingQuantity
      displayName: "当日充电量"
      unit: "kWh"
    - name: todayOutgoingQuantity
      displayName: "当日放电量"
      unit: "kWh"



customService:
  - name: CustomDcOffService
    displayName: "g18n:dc-off"
    description: "电池下电指令"
  - name:  CustomStandbyService
    displayName: "g18n:dc-on"
    description: "电池上电指令"
  - name: CustomSyncTimeService
    displayName: "g18n:syncTime"