brand: Pylon
model: TechUs108
type: bms
version: v1.0.0
author: "zz@hexems.com"
create: "2024-09-07"
remark: "派能108kWh风冷电池MBMS"
protocolType: "modbus"
telemetry:
    - name: bmsStatus
      displayName: "电池状态"
      type: label
      mapping:
        0: "未知|#FF5D5D"
        1: "关机|#9CBF30"
        2: "待机|#6967EE"
        3: "充电中|#29A634"
        4: "放电中|#0098FA"
        5: "故障|#FF5D5D"
        6: "同步中|#FF5D5D"
        7: "启动中|#FF5D5D"
    - name: soc
      unit: "%"
      displayName: "SOC"
    - name: capacity
      unit: "kWh"
      displayName: "电池容量"
    - name: dcPower
      unit: "kW"
      displayName: "直流功率"
    - name: dcVoltage
      unit: "V"
      displayName: "直流电压"
    - name: dcCurrent
      unit: "A"
      displayName: "直流电流"
    - name: historyIncomingQuantity
      unit: "kWh"
      displayName: "充电量"
    - name: historyOutgoingQuantity
      unit: "kWh"
      displayName: "放电量"


service:
  - name: CustomDcOffService
    displayName: "g18n:dc-off"
    description: "电池下电指令"
  - name:  CustomDcOnService
    displayName: "g18n:dc-on"
    description: "电池上电指令"
  - name: CustomSyncTimeService
    displayName: "g18n:syncTime"