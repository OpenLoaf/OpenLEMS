brand: HEX
model: Demo
type: ess
version: v1.0.0
author: "zz@hexems.com"
create: "2025-09-01"
desc: "测试储能柜"
protocolType: "modbus"
telemetry:
  - key: status
    name: "状态"
    displayType: label
    valueExplain:
      0: "未知|#FF5D5D"
      1: "关机|#9CBF30"
      2: "待机|#6967EE"
      3: "充电中|#29A634"
      4: "放电中|#0098FA"
      5: "故障|#FF5D5D"
      6: "同步中|#FF5D5D"
      7: "启动中|#FF5D5D"
  - key: soc
    unit: "%"
    name: "SOC"
  - key: power
    unit: "kW"
    name: "功率"
  - key: historyIncomingQuantity
    name: "历史充电量"
    unit: "kWh"
    desc: "历史充电量"
  - key: historyOutgoingQuantity
    name: "历史放电量"
    unit: "kWh"
    desc: "历史放电量"


service:
  - key: CustomPowerZeroService
    name: "零功率"
  - key:  CustomPowerRandomService
    name: "随机功率"