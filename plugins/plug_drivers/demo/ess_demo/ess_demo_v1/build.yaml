brand: HEX
model: Demo
type: ess
version: v1.0.0
author: "zz@hexems.com"
create: "2025-09-01"
desc: "测试储能柜"
protocolType: "modbus"
telemetry:
  - key: status
    name: "状态"
    displayType: label
    valueExplain:
      - key: "0"
        value: "未知"
        color: "#FF5D5D"
      - key: "1"
        value: "关机"
        color: "#9CBF30"
      - key: "2"
        value: "待机"
        color: "#6967EE"
      - key: "3"
        value: "充电中"
        color: "#29A634"
      - key: "4"
        value: "放电中"
        color: "#0098FA"
      - key: "5"
        value: "故障"
        color: "#FF5D5D"
      - key: "6"
        value: "同步中"
        color: "#FF5D5D"
      - key: "7"
        value: "启动中"
        color: "#FF5D5D"
  - key: soc
    unit: "%"
    name: "SOC"
  - key: power
    unit: "kW"
    name: "功率"
  - key: historyIncomingQuantity
    name: "历史充电量"
    unit: "kWh"
    desc: "历史充电量"
  - key: historyOutgoingQuantity
    name: "历史放电量"
    unit: "kWh"
    desc: "历史放电量"


service:
  - key: CustomPowerZeroService
    name: "零功率"
    description: "设置功率为零"
    icon: "power-off"
  - key:  CustomPowerRandomService
    name: "随机功率"
    description: "设置随机功率"
    icon: "shuffle"