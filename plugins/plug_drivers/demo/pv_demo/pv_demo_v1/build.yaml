brand: HEX
model: Demo
type: pv
version: v1.0.0
author: "zz@hexems.com"
create: "2025-09-01"
desc: "测试光伏"
protocolType: "modbus"
telemetry:
  - key: status
    name: "状态"
    displayType: label
    valueExplain:
      0: "未知|#FF5D5D"
      1: "关机|#9CBF30"
      2: "待机|#6967EE"
      4: "发电中|#0098FA"
      5: "故障|#FF5D5D"
  - key: power
    unit: "kW"
    name: "发电功率"
  - key: irradiance
    name: "当前辐照度"
    unit: "W/m²"
  - key: temperature
    name: "当前温度"
    unit: "°C"
  - key: historyOutgoingQuantity
    name: "历史发电量"
    unit: "kWh"

service:
  - key: CustomPowerZeroService
    name: "零功率"
    description: "设置功率为零"
    icon: "power-off"
  - key:  CustomPowerRandomService
    name: "随机功率"
    description: "设置随机功率"
    icon: "shuffle"