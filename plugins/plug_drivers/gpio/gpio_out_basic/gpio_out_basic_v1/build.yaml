brand: Hex
model: Basic-GPIO-Out
name: "基础GPIO输出驱动"
type: gpio_out
version: "v1.0.0"
author: "zz@hexems.com"
create: "2025-09-12"
protocolType: "gpio_out"
desc: "基础GPIO输出驱动，支持GPIO输出控制"
telemetry:
  - key: status
    name: "状态"
    value_type: int
    component_type: singleSelect
    paramExplain:
      - key: "true"
        value: "triggerName"
      - key: "false"
        value: "clearName"

service:
  - key: SetLow
    name: "低电平"
    description: "设置为低电平"
    icon: "toggle-left"
  - key: SetHigh
    name: "高电平"
    description: "设置为高电平"
    icon: "toggle-right"
  - key: StatusToggle
    name: "状态切换"
    description: "状态值互相切换"
    icon: "switch"