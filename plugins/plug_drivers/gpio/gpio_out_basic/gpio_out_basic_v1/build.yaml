brand: Hex
model: Basic-GPIO-Out
name: "基础GPIO输出驱动"
type: gpio_out
version: "v1.0.0"
author: "zz@hexems.com"
create: "2025-09-12"
protocolType: "gpio_out"
desc: "基础GPIO输出驱动，支持GPIO输出控制"
telemetry:
  - key: status
    name: "状态"
    paramExplain:
      1: triggerName
      0: clearName

service:
  - key: SetLow
    name: "低电平"
    description: "设置为低电平"
  - key: SetHigh
    name: "高电平"
    description: "设置为高电平"
  - key: StatusToggle
    name: "状态切换"
    description: "状态值互相切换"