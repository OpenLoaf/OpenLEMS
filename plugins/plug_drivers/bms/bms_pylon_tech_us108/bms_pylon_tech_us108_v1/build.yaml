brand: Pylon
model: TechUs108
type: bms
version: v1.0.0
author: "zz@hexems.com"
create: "2024-09-07"
desc: "派能108kWh风冷电池MBMS"
protocolType: "modbus"
telemetry:
    - key: bmsStatus
      name: "电池状态"
      displayType: label
      valueExplain:
        - key: "0"
          value: "未知"
          color: "#FF5D5D"
        - key: "1"
          value: "关机"
          color: "#9CBF30"
        - key: "2"
          value: "待机"
          color: "#6967EE"
        - key: "3"
          value: "充电中"
          color: "#29A634"
        - key: "4"
          value: "放电中"
          color: "#0098FA"
        - key: "5"
          value: "故障"
          color: "#FF5D5D"
    - key: soc
      unit: "%"
      name: "SOC"
    - key: capacity
      unit: "kWh"
      name: "电池容量"
    - key: dcPower
      unit: "kW"
      name: "直流功率"
    - key: dcVoltage
      unit: "V"
      name: "直流电压"
    - key: dcCurrent
      unit: "A"
      name: "直流电流"
    - key: historyIncomingQuantity
      unit: "kWh"
      name: "充电量"
    - key: historyOutgoingQuantity
      unit: "kWh"
      name: "放电量"


service:
  - key: CustomDcOffService
    name: "电池下电指令"
    description: "电池下电指令"
    icon: "power-off"
  - key:  CustomDcOnService
    name: "电池上电指令"
    description: "电池上电指令"
    icon: "power"
  - key: CustomSyncTimeService
    name: "时间同步指令"
    description: "同步设备时间"
    icon: "clock"
  - key: CustomTestTrigger
    name: "测试温度告警触发"
    description: "测试温度告警触发"
    icon: "alert-triangle"
  - key: CustomTestClear
    name: "测试温度告警消除"
    description: "测试温度告警消除"
    icon: "check-circle"
  - key: CustomNoFunction
    name: "测试不存在服务"
    description: "测试不存在服务"
    icon: "x-circle"
  - key: CustomSetParamFunction
    name: "测试参数设置"
    description: "测试参数设置"
    icon: "settings"
    params:
      - name: 测试数字
        value_type:  int
        component_type: number
        required: true
        step: 10
        uint: kW
        min: 0
        max: 100
        description: 输入测试数字
