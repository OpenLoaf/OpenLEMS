brand: Pylon
model: TechUs108
type: bms
version: v1.0.0
author: "zz@hexems.com"
create: "2024-09-07"
desc: "派能108kWh风冷电池MBMS"
protocolType: "modbus"
telemetry:
    - key: bmsStatus
      name: "电池状态"
      displayType: label
      valueExplain:
        0: "未知|#FF5D5D"
        1: "关机|#9CBF30"
        2: "待机|#6967EE"
        3: "充电中|#29A634"
        4: "放电中|#0098FA"
        5: "故障|#FF5D5D"
    - key: soc
      unit: "%"
      name: "SOC"
    - key: capacity
      unit: "kWh"
      name: "电池容量"
    - key: dcPower
      unit: "kW"
      name: "直流功率"
    - key: dcVoltage
      unit: "V"
      name: "直流电压"
    - key: dcCurrent
      unit: "A"
      name: "直流电流"
    - key: historyIncomingQuantity
      unit: "kWh"
      name: "充电量"
    - key: historyOutgoingQuantity
      unit: "kWh"
      name: "放电量"


service:
  - key: CustomDcOffService
    name: "电池下电指令"
    description: "电池下电指令"
  - key:  CustomDcOnService
    name: "电池上电指令"
    description: "电池上电指令"
  - key: CustomSyncTimeService
    name: "时间同步指令"
  - key: CustomTestTrigger
    name: "测试温度告警触发"
  - key: CustomTestClear
    name: "测试温度告警消除"
  - key: CustomNoFunction
    name: "测试不存在服务"