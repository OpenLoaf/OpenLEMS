storage:
  enable: false
  type: influxdb1
  #  url: http://124.221.64.180:8086
  url: http://192.168.2.136:8086
  #  username: test
  #  password: 123456
  systemMetricsSurvivalDays: 30 # 数据保存天数,0代表永久保存,-1代表不保存
  params:
    ## influxdb1的配置
    database: mydb
    ## influxdb2的配置
#    Token: "64W6GrhaK2XOYUPeI2_y-UKoQsDvGYJRQKrkVXOdRzpg14pTTGEpF-AfsoyeDv3R59zkidymcqJ3_UHsCCwZaA=="
#    Org: "hexems"
protocols:
  - id: modbus_ammeter
    protocol: modbus_tcp
    logLevel: INFO
    address: 192.168.1.66:5002
    timeout: 30

device:
  id: root
  name: XX场站
  enable: true
  device-children:
    - id: station-energy-store
      name: 储能站
      driver: sess_basic_v1.0.0
      enable: true
      logLevel: INFO
      params:
        maxCharge: 30
        maxDischarge: 30
        capacity: 100
        modbusServerEnable: true
        modbusUrl: tcp://0.0.0.0:1506
      device-children:
        - id : station-ammeter-1
          name: 物理安科瑞电表
          protocolId: modbus_ammeter
          driver: ammeter_acrel_10r_v1.0.0
          enable: true
          logLevel: INFO
          params:
            unitId: 1