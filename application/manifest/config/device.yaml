devices:
#  - id: root-ammeter
#    name: 总表
#    type: root-ammeter
#    enable: true

  - id: station-energy-store
    name: 储能站
    type: station-energy-store
    #    driver: energy_store
    enable: true
    logLevel: INFO
    params:
      maxCharge: 30
      maxDischarge: 30
      capacity: 100
    device-children:
      - id: button-scram
        name: 急停按钮
        protocolConfigId: modbus_local
        enable: true
        level: Error
        params:
          path: /Users/zhao/Downloads/gpio
          direction: in
      - id: led-running
        name: 运行指示灯
        protocolConfigId: modbus_local
        enable: true
        params:
          io: 290
          path: /Users/zhao/Downloads/gpio
          direction: out
      - id: led-fault
        name: 故障指示灯
        enable: true
        params:
          path: /Users/zhao/Downloads/gpio
          direction: out
      - id: ess-1
        name: 储能柜1
        type: energy-store
        driver: ess_pylon_checkwatt
        enable: true
        params:
          maxCharge: 30
          maxDischarge: 30
        device-children:
          - id: star-charge-100E-1
            name: 本地模拟阳光电源PCS
            protocolConfigId: modbus_local
            enable: true
            driver: pcs_starCharge100E
            type: pcs
            logLevel: INFO
            
            params:
              unitId: 1
              ratedPower: 100
              syncTime: true   # 同步时间
          - id: pylon-tech-us108-1
            name: 本地模拟派能MBMS
            protocolConfigId: modbus_local
            enable: true
            driver: bms_pylonTechUs108
            type: bms
            logLevel: INFO
            
            params:
              unitId: 2
              syncTime: true # 同步时间
              ratedPower: 100
              capacity: 100
              maxInputPower: 70
              maxOutputPower: 70
          - id: button-charge
            name: 充电开关
            protocolConfigId: gpio
            enable: true
            params:
              path: /Users/zhao/Downloads/gpio
              direction: in
          - id: button-discharge
            name: 放电开关
            protocolConfigId: gpio
            enable: true
            params:
              path: /Users/zhao/Downloads/gpio
              direction: in
              reverse: true

protocols:
  - id: modbus_local
    protocol: modbus_tcp
    enable: true
    logLevel: INFO
    address: 127.0.0.1:1503
    timeout: 3000
  - id: gpio
    protocol: gpio  # sysfs
    enable: true
    logLevel: DEBUG
    params:
      exportCommand: "echo %d | %s/export"
      path: /Users/zhao/Downloads/gpio
      period: 200 # 读取周期
